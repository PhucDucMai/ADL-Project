version: "3.8"

services:
  fight-detection:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fight-detection
    ports:
      - "8501:8501"
    volumes:
      # Mount data directory for training data and checkpoints
      - ../data:/app/data
      - ../checkpoints:/app/checkpoints
      - ../logs:/app/logs
      - ../configs:/app/configs
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
    # GPU support: requires nvidia-container-toolkit
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    # For RTSP access, use host network mode
    # Uncomment the following line if using RTSP streams:
    # network_mode: host

  # Training service (run with: docker compose run training)
  training:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fight-detection-training
    volumes:
      - ../data:/app/data
      - ../checkpoints:/app/checkpoints
      - ../logs:/app/logs
      - ../configs:/app/configs
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      python -m training.train --config configs/default.yaml
    profiles:
      - training
